<svg xmlns="http://www.w3.org/2000/svg" width="760" height="464" viewBox="0 0 760 464" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="464" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">depnews — what actually changed in this bump</text>

  <text x="24" y="62" fill="#7ee787">$ depnews digest --old main.lock --dir .</text>
  <text x="24" y="86" fill="#c9d1d9">depnews 0.1.0 — <tspan fill="#d29922">6 packages changed</tspan></text>
  <text x="24" y="106" fill="#8b949e">change: 4 upgraded, 1 added, 1 removed</text>
  <text x="24" y="126" fill="#8b949e">notes:  <tspan fill="#f85149">breaking in 1 package</tspan> · <tspan fill="#f85149">security in 1</tspan> · deprecations in 1</text>
  <text x="24" y="146" fill="#8b949e">gaps:   1 package without a changelog on disk</text>

  <text x="24" y="178" fill="#c9d1d9" xml:space="preserve">csv-sift  1.9.0 -&gt; 2.0.0  (major)  <tspan fill="#f85149">[breaking]</tspan></text>
  <text x="24" y="198" fill="#8b949e" xml:space="preserve">  changelog: node_modules/csv-sift/HISTORY.md</text>
  <text x="24" y="218" fill="#c9d1d9" xml:space="preserve">  2.0.0 (2026-06-30)</text>
  <text x="24" y="238" fill="#c9d1d9" xml:space="preserve">      * <tspan fill="#f85149">BREAKING</tspan>: `sift()` now returns a Promise; the Node-style callback form is removed</text>
  <text x="24" y="258" fill="#c9d1d9" xml:space="preserve">      * <tspan fill="#f85149">BREAKING</tspan>: drop support for Node 16 (now requires &gt;= 18)</text>

  <text x="24" y="290" fill="#c9d1d9" xml:space="preserve">quicklog  2.4.1 -&gt; 2.4.3  (patch)  <tspan fill="#f85149">[security]</tspan></text>
  <text x="24" y="310" fill="#c9d1d9" xml:space="preserve">  2.4.2 (2026-06-18)</text>
  <text x="24" y="330" fill="#c9d1d9" xml:space="preserve">    ### Security</text>
  <text x="24" y="350" fill="#c9d1d9" xml:space="preserve">    * escape ANSI sequences in user-supplied fields … (<tspan fill="#f85149">CVE-2026-11223</tspan>)</text>

  <text x="24" y="382" fill="#c9d1d9" xml:space="preserve">opaque-blob  1.1.0 -&gt; 1.2.0  (minor)</text>
  <text x="24" y="402" fill="#8b949e" xml:space="preserve">  no changelog file ships with the installed package</text>
  <text x="24" y="422" fill="#8b949e" xml:space="preserve">  homepage: https://example.test/opaque-blob</text>

  <text x="24" y="450" fill="#7ee787">$ depnews digest --old main.lock --fail-on breaking,security <tspan fill="#8b949e"># CI gate: exit 1</tspan></text>
</svg>
